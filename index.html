<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJ TTS Cyberpunk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyber-container">
        <header>
            <h1>SAY MY NAME <span class="neon-text">TJ-TTS</span></h1>
            <p class="status">Система: Омода барои сабт</p>

        <div class="alphabet-grid" id="alphabetGrid"></div>

        <div class="control-panel">
            <textarea id="textInput" placeholder="Матнро инҷо нависед..."></textarea>
            <div class="button-group">
                <button id="btnSpeak" class="glow-btn">ХОНДАН</button>
                <button id="btnClear" class="alt-btn">ТОЗА КАРДАН</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
